<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desert Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a18;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,sans-serif}
#root{position:relative}
#gameCanvas{display:block}

/* ── 오버레이 공통 구조 ── */
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:opacity 0.5s;pointer-events:auto}
.overlay.hidden{opacity:0;pointer-events:none}
#menu-overlay{background:transparent}
#gameover-overlay{background:rgba(0,0,0,0.5)}
#ending-overlay{background:transparent}

/* ── 오버레이 텍스트/점수 ── */
.overlay-title{font-size:26px;font-weight:500;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,0.5)}
.overlay-sub{font-size:13px;color:rgba(255,255,255,0.75);text-shadow:0 1px 4px rgba(0,0,0,0.4)}
.overlay-score{font-size:34px;font-weight:500;color:#fff;margin:4px 0}
.overlay-record{font-size:12px;color:rgba(255,255,255,0.5)}

/* ── 오버레이 버튼 ── */
.overlay-btns{display:flex;flex-direction:column;gap:10px;margin-top:10px;width:200px}
.overlay-btns.row{flex-direction:row;width:auto}
.overlay-btn{width:100%;padding:12px 0;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:#ffffff;color:#333;border:none;-webkit-appearance:none;appearance:none}
.overlay-btn:hover{background:#f0f0f0}
.overlay-btns.row .overlay-btn{width:auto;padding:9px 26px}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,0.22);opacity:0;transition:opacity 0.4s;pointer-events:none}
#hud.visible{opacity:1}
.hud-score{font-size:14px;font-weight:500;color:#fff}
.hud-mode{font-size:10px;padding:2px 9px;border-radius:999px;background:rgba(239,159,39,0.35);color:#EF9F27;font-weight:500}
.hud-goal{font-size:11px;color:rgba(255,255,255,0.65)}

/* ── 조작 팁 ── */
.game-tip{position:absolute;bottom:5px;left:0;width:100%;text-align:center;font-size:11px;color:rgba(255,255,255,0.4);pointer-events:none;display:none}
</style>
</head>
<body>
<div id="root">
  <canvas id="gameCanvas" width="700" height="360"></canvas>
  <div id="hud">
    <div class="hud-score">점수: <span id="score-display">0</span></div>
    <div class="hud-mode" id="hud-mode-badge">스토리</div>
    <div class="hud-goal" id="hud-goal-text">목표: 500점</div>
  </div>
  <div class="overlay" id="menu-overlay">
    <div class="overlay-title">Desert Runner</div>
    <div class="overlay-sub">모드를 선택하세요</div>
    <div class="overlay-btns">
      <button class="overlay-btn" onclick="onStartBtn('story')">스토리 모드</button>
      <button class="overlay-btn" onclick="onStartBtn('infinite')">무한 모드</button>
    </div>
  </div>
  <div class="game-tip" id="game-tip">스페이스 / 위: 점프 | 아래: 숙이기</div>
  <div class="overlay hidden" id="gameover-overlay">
    <div class="overlay-title">게임 오버</div>
    <div class="overlay-sub">황야를 달리다 쓰러졌어요</div>
    <div class="overlay-score" id="go-score">0점</div>
    <div class="overlay-record" id="go-record"></div>
    <div class="overlay-btns row">
      <button class="overlay-btn" onclick="restartGame()">다시 도전</button>
      <button class="overlay-btn" onclick="goHome()">메인으로</button>
    </div>
  </div>
  <div class="overlay hidden" id="ending-overlay">
    <div class="overlay-btns row">
      <button class="overlay-btn" onclick="onStartBtn('infinite')">무한모드 도전</button>
      <button class="overlay-btn" onclick="goHome()">메인으로</button>
    </div>
  </div>
</div>
<script>
// ════════════════════════════════════════════════
//  DOM 캐싱 — 매 프레임 querySelector 호출 방지
// ════════════════════════════════════════════════
const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const elScore    = document.getElementById('score-display');
const elHud      = document.getElementById('hud');
const elHudBadge = document.getElementById('hud-mode-badge');
const elHudGoal  = document.getElementById('hud-goal-text');
const elGameTip  = document.getElementById('game-tip');
const elGoScore  = document.getElementById('go-score');
const elGoRecord = document.getElementById('go-record');
const elMenuOv   = document.getElementById('menu-overlay');
const elGameOv   = document.getElementById('gameover-overlay');
const elEndOv    = document.getElementById('ending-overlay');

// ════════════════════════════════════════════════
//  다크모드 감지 — 매 프레임 matchMedia 호출 방지
// ════════════════════════════════════════════════
const darkMQ = window.matchMedia('(prefers-color-scheme:dark)');
let isDark   = darkMQ.matches;
darkMQ.addEventListener('change', e => { isDark = e.matches; });

// ════════════════════════════════════════════════
//  게임 밸런스 상수
// ════════════════════════════════════════════════
const STORY_GOAL     = 500;             // 스토리 모드 클리어 점수
const INIT_SPEED     = 4;               // 시작 속도
const MAX_SPEED      = 14;              // 최대 속도 상한
const BOOST_AMOUNT   = 1.5;             // 점수 구간 달성 시 1회 속도 추가량
const BOOST_INTERVAL = STORY_GOAL / 2;  // 부스트 발동 점수 간격 (250점마다)

// ════════════════════════════════════════════════
//  물리 상수 (원본 공룡 게임 기준)
// ════════════════════════════════════════════════
const GRAVITY          = 0.6;  // 중력 가속도 (프레임당)
const JUMP_VELOCITY    = -10;  // 점프 초기 속도
const SPEED_DROP_COEFF = 3;    // 공중 아래키 중력 배수 (빠른 낙하)

// ════════════════════════════════════════════════
//  장애물 상수 (원본 공룡 게임 GAP 공식 기반)
// ════════════════════════════════════════════════
const GAP_COEFFICIENT = 0.6;   // 장애물 간격 기본 배수
const MAX_GAP_COEFF   = 1.5;   // 장애물 간격 최대 배수
const OB_MIN_GAP      = { cactus:120, rock:150, tumbleweed:130, ptero:200 }; // 타입별 최소 간격
const SCORE_DIVISOR   = 25;    // 이동거리 → 점수 환산 (25px = 1점, 원본 방식)
const PTERO_MIN_SCORE = 200;   // 프테라노돈 등장 시작 점수
const PTERO_H         = 30;    // 프테라노돈 높이 — 이 값만 바꾸면 PTERO_YS·getOH 자동 반영
const ENDING_RUN_MS   = 2000;  // 클리어 후 엔딩 진입까지 달리는 시간 (ms)

// ════════════════════════════════════════════════
//  캐릭터 스프라이트 크기
// ════════════════════════════════════════════════
const SPRITE_W = 48;  // 캐릭터 가로 크기
const SPRITE_H = 48;  // 캐릭터 세로 크기
const DUCK_H   = 24;  // 숙이기 상태 히트박스 높이

// ════════════════════════════════════════════════
//  화면 비율 기반 동적 리사이즈
//  BASE_W:BASE_H 비율 유지하며 화면을 꽉 채움
// ════════════════════════════════════════════════
const BASE_W = 700, BASE_H = 360;
const ASPECT = BASE_W / BASE_H; // 기준 비율 ≈ 1.944

// 리사이즈 시 갱신되는 화면 의존 변수
let W, H;
let GROUND_Y;        // 지면 y좌표 (H의 약 80.6%)
let PTERO_YS = [];   // 프테라노돈 3단계 높이
let LAST_SPAWN_DIST; // 스토리 모드 마지막 스폰 가능 이동거리 (사전 계산)
let END_WALK_SPEED;  // 엔딩씬 캐릭터 이동 속도 (W 기준)

function resizeCanvas() {
  const sw = window.innerWidth, sh = window.innerHeight;
  if(sw / sh > ASPECT) { H = sh; W = Math.round(sh * ASPECT); }
  else                  { W = sw; H = Math.round(sw / ASPECT); }

  canvas.width  = W;
  canvas.height = H;
  document.getElementById('root').style.width  = W + 'px';
  document.getElementById('root').style.height = H + 'px';

  // 지면 위치: 기준 비율 290/360 = 80.6% 유지
  GROUND_Y = Math.round(H * (290 / 360));

  // 프테라노돈 높이 3단계 (GROUND_Y, SPRITE_H, PTERO_H 기준 상대값)
  PTERO_YS = [
    GROUND_Y - PTERO_H - 10,                          // 하단: 점프로 피하기
    GROUND_Y - Math.round(SPRITE_H * 0.7) - PTERO_H,  // 중단: 슬라이딩으로 피하기
    GROUND_Y - SPRITE_H - PTERO_H - 10,               // 상단: 그냥 통과
  ];

  // 플레이어 위치 갱신
  player.ground = GROUND_Y - SPRITE_H;
  player.x      = Math.round(W * 0.11); // 화면 너비의 11% 위치

  // 스토리 모드 마지막 스폰 가능 거리 (사전 계산 → 매 프레임 연산 없이 비교만)
  // 장애물이 W+10에서 player.x까지 오는 거리를 총 클리어 거리에서 뺀 값
  LAST_SPAWN_DIST = STORY_GOAL * SCORE_DIVISOR - (W + 10 - player.x);

  // 엔딩씬 걷는 속도 (W의 0.4% → 어떤 화면에서도 일정한 소요시간)
  END_WALK_SPEED = Math.max(1, Math.round(W * 0.004));

  // 배경 타일 오프셋 리셋
  skyX    = 0;
  groundX = 0;

  if(gamePhase === 'menu') drawMenuStatic();
}
window.addEventListener('resize', resizeCanvas);

// ════════════════════════════════════════════════
//  이미지 슬롯
//  캐릭터: stand, run1, run2, jump, duck, ptero
//  엔딩씬: endA, endB, endHug
//  배경:   bgSky(하늘), bgGround(땅) — 타일링용
// ════════════════════════════════════════════════
const imgs = {
  stand:null, run1:null, run2:null, jump:null, duck:null, ptero:null,
  endA:null, endB:null, endHug:null,
  bgSky:null, bgGround:null,
};

// ════════════════════════════════════════════════
//  배경 타일링 오프셋
//  이미지 없으면 단색 폴백으로 대체
// ════════════════════════════════════════════════
let skyX    = 0; // 하늘 배경 타일 x 오프셋
let groundX = 0; // 땅 타일 x 오프셋

// ════════════════════════════════════════════════
//  게임 상태 변수
// ════════════════════════════════════════════════
let mode      = 'story'; // 'story' | 'infinite'
let gamePhase = 'menu';  // menu | opening | playing | ending-run | ending | gameover

let distanceRan  = 0; // 총 이동 픽셀 (점수 계산 기준)
let displayScore = 0; // 화면에 표시되는 점수
let bestScore    = 0; // 무한모드 최고 기록

let speed         = INIT_SPEED; // 현재 속도
let frameCount    = 0;          // 총 프레임 수 (애니메이션용)
let lastTimestamp = null;       // deltaTime 계산용 이전 타임스탬프
let elapsedMs     = 0;          // 게임 시작 후 경과 ms (속도 곡선 계산용)

let distSince       = 0;              // 마지막 장애물 이후 이동 거리
let nextGap         = 600;            // 다음 장애물까지 간격
let nextBoostScore  = BOOST_INTERVAL; // 다음 부스트 발동 점수

let openingTimer    = 0; // 오프닝 연출 타이머 (ms)
let endingRunTimer  = 0; // 클리어 후 달리기 타이머 (ms)
let scrolling       = true; // 배경 스크롤 활성화 여부 (엔딩 포옹씬에서 false)
let gameAnimId      = null; // requestAnimationFrame ID

// ════════════════════════════════════════════════
//  플레이어 상태
// ════════════════════════════════════════════════
const player = {
  x: 80, y: 0,        // 위치 (x는 resizeCanvas에서 갱신)
  vy: 0,              // 수직 속도
  onGround: true,     // 지면 접촉 여부
  ducking: true,      // 숙이기 상태
  speedDrop: false,   // 공중 아래키 빠른 낙하 여부
  ground: 0,          // 지면 y좌표 (resizeCanvas에서 갱신)
};

// ════════════════════════════════════════════════
//  입력 상태
// ════════════════════════════════════════════════
const keys = { down: false };

// ════════════════════════════════════════════════
//  게임 오브젝트 배열
// ════════════════════════════════════════════════
let obstacles = []; // 장애물 목록
let particles = []; // 점프 파티클 목록

// ════════════════════════════════════════════════
//  엔딩씬 상태
// ════════════════════════════════════════════════
let endPhase      = 'walk'; // 'walk' | 'hug' | 'text'
let endAx         = 0;      // 엔딩씬 A 캐릭터 x 위치
let endBx         = 0;      // 엔딩씬 B 캐릭터 x 위치
let endWalkFrame  = 0;      // 엔딩씬 걷기 애니메이션 프레임 카운트
let endHugScale   = 0;      // 포옹 이미지 페이드인 (0→1)
let endTextAlpha  = 0;      // 엔딩 텍스트 페이드인 (0→1)
let heartParticles = [];    // 포옹 시 하트 파티클

// ════════════════════════════════════════════════
//  오버레이 유틸
// ════════════════════════════════════════════════
function showOverlay(el) { el.classList.remove('hidden'); el.style.opacity = '1'; }
function hideOverlay(el) { el.classList.add('hidden');    el.style.opacity = '0'; }

// ════════════════════════════════════════════════
//  게임 시작 버튼
// ════════════════════════════════════════════════
function onStartBtn(m) {
  mode = m;
  hideOverlay(elGameOv);
  hideOverlay(elEndOv);
  elHudBadge.textContent = m === 'story' ? '스토리' : '무한';
  elHudGoal.textContent  = m === 'story' ? '목표: ' + STORY_GOAL + '점' : '최고: ' + bestScore + '점';

  // 메뉴 페이드아웃 — 완료 후 루프 시작 (캔버스는 정적 유지)
  elMenuOv.style.transition = 'opacity 0.5s';
  elMenuOv.style.opacity    = '0';
  setTimeout(() => {
    elMenuOv.classList.add('hidden');
    elMenuOv.style.transition = '';
    openingTimer  = 0;
    endingRunTimer= 0;
    scrolling     = true;
    resetGameState();
    elGameTip.style.display = 'block';
    elHud.classList.add('visible');
    gamePhase     = 'opening';
    lastTimestamp = null;
    gameAnimId    = requestAnimationFrame(gameLoop);
  }, 500);
}

// ════════════════════════════════════════════════
//  게임 상태 초기화
// ════════════════════════════════════════════════
function resetGameState() {
  distanceRan    = 0;
  displayScore   = 0;
  speed          = INIT_SPEED;
  frameCount     = 0;
  elapsedMs      = 0;
  distSince      = 0;
  nextGap        = 600;
  nextBoostScore = BOOST_INTERVAL;
  endingRunTimer = 0;
  obstacles      = [];
  particles      = [];
  skyX           = 0;
  groundX        = 0;
  player.y         = player.ground;
  player.vy        = 0;
  player.onGround  = true;
  player.ducking   = true;
  player.speedDrop = false;
  keys.down        = false;
  elScore.textContent = '0';
}

// ════════════════════════════════════════════════
//  메인 메뉴로 돌아가기
// ════════════════════════════════════════════════
function goHome() {
  cancelAnimationFrame(gameAnimId); gameAnimId = null;
  gamePhase = 'menu';
  scrolling = true;
  elGameTip.style.display = 'none';
  elHud.classList.remove('visible');
  hideOverlay(elGameOv);
  hideOverlay(elEndOv);
  elMenuOv.style.transition = 'none';
  elMenuOv.style.opacity    = '1';
  elMenuOv.classList.remove('hidden');
  resetGameState();
  drawMenuStatic();
}

// ════════════════════════════════════════════════
//  다시 도전
// ════════════════════════════════════════════════
function restartGame() {
  hideOverlay(elGameOv);
  cancelAnimationFrame(gameAnimId); gameAnimId = null;
  openingTimer  = 0;
  scrolling     = true;
  resetGameState();
  gamePhase     = 'opening';
  lastTimestamp = null;
  gameAnimId    = requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════════
//  입력 처리
// ════════════════════════════════════════════════
function doJump() {
  if(gamePhase !== 'playing') return;
  if(player.onGround && !player.ducking) {
    player.vy        = JUMP_VELOCITY;
    player.onGround  = false;
    player.speedDrop = false;
    spawnParticles(player.x + SPRITE_W / 2, player.y + SPRITE_H, 5);
  }
}
function startDuck() {
  if(gamePhase !== 'playing') return;
  keys.down = true;
  if(!player.onGround) player.speedDrop = true; // 공중 아래키: 빠른 낙하
}
function endDuck() {
  keys.down        = false;
  player.speedDrop = false;
  if(player.ducking) player.ducking = false;
}

document.addEventListener('keydown', e => {
  if(e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump();    }
  if(e.code === 'ArrowDown')                     { e.preventDefault(); startDuck(); }
});
document.addEventListener('keyup', e => { if(e.code === 'ArrowDown') endDuck(); });
canvas.addEventListener('click',      doJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); doJump(); });

// ════════════════════════════════════════════════
//  장애물 유틸
// ════════════════════════════════════════════════
// 타입별 너비
function getOW(t) { return t==='rock'?30 : t==='cactus'?24 : t==='tumbleweed'?28 : 46; }
// 타입별 높이 (PTERO_H 상수 사용 → 한 곳만 수정하면 됨)
function getOH(t) { return t==='rock'?24 : t==='cactus'?40 : t==='tumbleweed'?30 : PTERO_H; }

// 원본 공룡 게임 GAP 공식
function calcGap(t) {
  const min = Math.round(getOW(t) * speed + OB_MIN_GAP[t] * GAP_COEFFICIENT);
  const max = Math.round(min * MAX_GAP_COEFF);
  return min + Math.floor(Math.random() * (max - min));
}

// 장애물 스폰
function spawnObstacle() {
  // 스토리 모드: 클리어 전에 도달 불가능한 장애물 생성 안 함
  if(mode === 'story' && distanceRan >= LAST_SPAWN_DIST) return;

  const gt = ['cactus', 'rock', 'tumbleweed'];
  const t  = (displayScore >= PTERO_MIN_SCORE && Math.random() < 0.3)
             ? 'ptero' : gt[Math.floor(Math.random() * 3)];
  const w = getOW(t), h = getOH(t);
  const y = t === 'ptero' ? PTERO_YS[Math.floor(Math.random() * 3)] : GROUND_Y - h;

  obstacles.push({ x: W + 10, y, w, h, type: t, rot: 0 });
  distSince = 0;
  nextGap   = calcGap(t);
}

// ════════════════════════════════════════════════
//  파티클 (점프 시 발 아래 먼지 효과)
// ════════════════════════════════════════════════
function spawnParticles(x, y, n) {
  for(let i = 0; i < n; i++)
    particles.push({ x, y, vx:(Math.random()-.5)*4, vy:-Math.random()*3, life:1, r:3+Math.random()*2 });
}

// ════════════════════════════════════════════════
//  물리 업데이트 (playing / ending-run 공통 로직)
//  장애물·파티클 이동, 착지 처리
// ════════════════════════════════════════════════
function updatePhysics(fd, gs) {
  // 플레이어 수직 물리
  if(!player.onGround) {
    const gm = player.speedDrop ? SPEED_DROP_COEFF : 1;
    player.vy += GRAVITY * gm * gs;
    player.y  += player.vy * gs;
    if(player.y >= player.ground) {
      player.y         = player.ground;
      player.vy        = 0;
      player.onGround  = true;
      player.speedDrop = false;
      if(keys.down) player.ducking = true;
    }
  }

  // 장애물 이동 + 화면 밖 제거 (장애물 너비 2배 기준)
  obstacles.forEach(o => { o.x -= fd; if(o.type === 'tumbleweed') o.rot += 0.1 * gs; });
  obstacles = obstacles.filter(o => o.x > -getOW(o.type) * 2);

  // 파티클 이동
  particles.forEach(p => { p.x += p.vx*gs; p.y += p.vy*gs; p.vy += 0.2*gs; p.life -= 0.08*gs; });
  particles = particles.filter(p => p.life > 0);
}

// ════════════════════════════════════════════════
//  드로우: 배경 (타일링 무한 스크롤)
//  이미지 없으면 단색 폴백
// ════════════════════════════════════════════════
function drawBg() {
  if(imgs.bgSky) {
    // 2장을 나란히 그려 이음매 없이 스크롤
    ctx.drawImage(imgs.bgSky, skyX,     0, W, GROUND_Y);
    ctx.drawImage(imgs.bgSky, skyX + W, 0, W, GROUND_Y);
  } else {
    ctx.fillStyle = isDark ? '#1a1a18' : '#F1EFE8';
    ctx.fillRect(0, 0, W, GROUND_Y);
  }
}

function drawGround() {
  if(imgs.bgGround) {
    const gh = H - GROUND_Y; // 땅 영역 높이
    ctx.drawImage(imgs.bgGround, groundX,     GROUND_Y, W, gh);
    ctx.drawImage(imgs.bgGround, groundX + W, GROUND_Y, W, gh);
  } else {
    ctx.fillStyle = isDark ? '#2C2C2A' : '#D3D1C7';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = isDark ? '#3C3C3A' : '#B4B2A9';
    ctx.fillRect(0, GROUND_Y, W, 3);
  }
}

// 배경 타일 오프셋 업데이트 (매 프레임, scrolling 플래그로 제어)
function updateBgScroll(fd) {
  if(!scrolling) return;
  skyX    -= fd * 0.3; // 하늘: 느리게 (시차 효과)
  groundX -= fd;       // 땅: 게임 속도와 동일

  // 타일 한 장 너비만큼 이동하면 리셋 (무한 루프)
  if(skyX    <= -W) skyX    = 0;
  if(groundX <= -W) groundX = 0;
}

// ════════════════════════════════════════════════
//  드로우: 플레이어
//  이미지 있으면 스프라이트, 없으면 도형 폴백
// ════════════════════════════════════════════════
function drawPlayer(ducking, y, fc) {
  const dH = ducking ? DUCK_H   : SPRITE_H;
  const dY = ducking ? GROUND_Y - DUCK_H : y;

  // 상태별 스프라이트 선택
  let sp = null;
  if(ducking)               sp = imgs.duck;
  else if(y < player.ground - 2) sp = imgs.jump;
  else sp = Math.floor(fc / 8) % 2 === 0 ? imgs.run1 : imgs.run2;

  if(sp) {
    ctx.imageSmoothingEnabled = false; // 픽셀아트 계단현상 방지
    ctx.drawImage(sp, player.x, dY, SPRITE_W, dH);
    return;
  }

  // 도형 폴백
  if(ducking) {
    ctx.fillStyle = isDark ? '#888780' : '#5F5E5A';
    ctx.beginPath(); ctx.roundRect(player.x, dY+4, SPRITE_W, DUCK_H-4, 5); ctx.fill();
    ctx.fillStyle = '#BA7517';
    ctx.beginPath(); ctx.roundRect(player.x+2, dY+6, SPRITE_W-4, 10, 3); ctx.fill();
  } else {
    ctx.fillStyle = isDark ? '#888780' : '#5F5E5A';
    ctx.beginPath(); ctx.roundRect(player.x+4, y, SPRITE_W-8, SPRITE_H-10, 6); ctx.fill();
    ctx.fillStyle = '#BA7517';
    ctx.beginPath(); ctx.roundRect(player.x+6, y+2, SPRITE_W-12, 14, 4); ctx.fill();
    const lo = Math.sin(fc * 0.3) * 4; // 다리 애니메이션
    ctx.fillStyle = isDark ? '#CCC' : '#888';
    ctx.fillRect(player.x+6,          y+SPRITE_H-12, 8, 12+lo);
    ctx.fillRect(player.x+SPRITE_W-14, y+SPRITE_H-12, 8, 12-lo);
  }
}

// ════════════════════════════════════════════════
//  드로우: 스탠딩 (오프닝 연출용)
// ════════════════════════════════════════════════
function drawStanding() {
  const sp = imgs.stand || imgs.run1;
  if(sp) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sp, player.x, GROUND_Y - SPRITE_H, SPRITE_W, SPRITE_H);
    return;
  }
  ctx.fillStyle = isDark ? '#888780' : '#5F5E5A';
  ctx.beginPath(); ctx.roundRect(player.x+4, GROUND_Y-SPRITE_H, SPRITE_W-8, SPRITE_H-10, 6); ctx.fill();
  ctx.fillStyle = '#BA7517';
  ctx.beginPath(); ctx.roundRect(player.x+6, GROUND_Y-SPRITE_H+2, SPRITE_W-12, 14, 4); ctx.fill();
  ctx.fillStyle = isDark ? '#CCC' : '#888';
  ctx.fillRect(player.x+6,          GROUND_Y-12, 8, 12);
  ctx.fillRect(player.x+SPRITE_W-14, GROUND_Y-12, 8, 12);
}

// ════════════════════════════════════════════════
//  드로우: 장애물
// ════════════════════════════════════════════════
function drawObstacle(o) {
  ctx.save();
  if(o.type === 'ptero') {
    if(imgs.ptero) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(imgs.ptero, o.x, o.y, o.w, o.h);
    } else {
      // 삼각형 몸체 + 날개 도형 폴백
      ctx.fillStyle = isDark ? '#9FE1CB' : '#1D9E75';
      ctx.beginPath(); ctx.moveTo(o.x+o.w/2,o.y+o.h); ctx.lineTo(o.x,o.y); ctx.lineTo(o.x+o.w,o.y); ctx.closePath(); ctx.fill();
      ctx.fillStyle = isDark ? '#5DCAA5' : '#0F6E56';
      ctx.beginPath(); ctx.moveTo(o.x-10,o.y+8); ctx.lineTo(o.x+o.w/2,o.y+4); ctx.lineTo(o.x+o.w+10,o.y+8); ctx.lineTo(o.x+o.w/2,o.y+16); ctx.closePath(); ctx.fill();
    }
  } else if(o.type === 'cactus') {
    ctx.fillStyle = isDark ? '#3B6D11' : '#639922';
    ctx.fillRect(o.x+8, o.y, 8, o.h);
    ctx.fillRect(o.x, o.y+10, o.w, 8);
  } else if(o.type === 'rock') {
    ctx.fillStyle = isDark ? '#444441' : '#888780';
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h/2+4, o.w/2, o.h/2, 0, 0, Math.PI*2); ctx.fill();
  } else { // tumbleweed
    ctx.translate(o.x+o.w/2, o.y+o.h/2); ctx.rotate(o.rot);
    ctx.fillStyle = isDark ? '#B4B2A9' : '#888780';
    ctx.beginPath(); ctx.arc(0, 0, o.w/2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = isDark ? '#888780' : '#5F5E5A'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-o.w/2,0); ctx.lineTo(o.w/2,0); ctx.moveTo(0,-o.h/2); ctx.lineTo(0,o.h/2); ctx.stroke();
  }
  ctx.restore();
}

// ════════════════════════════════════════════════
//  드로우: 파티클
// ════════════════════════════════════════════════
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = '#BA7517';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ════════════════════════════════════════════════
//  드로우: 엔딩씬 캐릭터
//  isB=true면 좌우 반전 (마주보게)
//  frame=0이면 다리 정지 (스탠딩 연출)
// ════════════════════════════════════════════════
function drawEndChar(x, isB, frame) {
  ctx.save();
  ctx.translate(x, GROUND_Y);
  if(isB) ctx.scale(-1, 1); // B는 좌우 반전

  const sp = isB ? (imgs.endB || imgs.stand) : (imgs.endA || imgs.run1);
  if(sp) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sp, -SPRITE_W/2, -SPRITE_H, SPRITE_W, SPRITE_H);
  } else {
    ctx.fillStyle = isB ? (isDark?'#9FE1CB':'#1D9E75') : (isDark?'#888780':'#5F5E5A');
    ctx.beginPath(); ctx.roundRect(-SPRITE_W/2+4, -SPRITE_H, SPRITE_W-8, SPRITE_H-10, 6); ctx.fill();
    ctx.fillStyle = isB ? '#0F6E56' : '#BA7517';
    ctx.beginPath(); ctx.roundRect(-SPRITE_W/2+6, -SPRITE_H+2, SPRITE_W-12, 14, 4); ctx.fill();
    const lo = Math.sin(frame * 0.35) * 5; // frame=0이면 lo=0 → 다리 정지
    ctx.fillStyle = isDark ? '#CCC' : '#888';
    ctx.fillRect(-SPRITE_W/2+6,          -12, 8, 12+lo);
    ctx.fillRect(-SPRITE_W/2+SPRITE_W-14, -12, 8, 12-lo);
  }
  ctx.restore();
}

// ════════════════════════════════════════════════
//  드로우: 포옹씬 (endBx 기준 위치)
// ════════════════════════════════════════════════
function drawHugScene() {
  if(imgs.endHug) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(imgs.endHug, endBx - SPRITE_W/2, GROUND_Y - SPRITE_H, SPRITE_W*2, SPRITE_H);
    return;
  }
  // 도형 폴백: 두 캐릭터가 팔을 뻗어 안는 형태
  ctx.save(); ctx.translate(endBx-18, GROUND_Y);
  ctx.fillStyle = isDark?'#888780':'#5F5E5A';
  ctx.beginPath(); ctx.roundRect(-16,-SPRITE_H,28,SPRITE_H-10,6); ctx.fill();
  ctx.fillStyle = '#BA7517';
  ctx.beginPath(); ctx.roundRect(-14,-SPRITE_H+2,24,14,4); ctx.fill();
  ctx.fillStyle = isDark?'#888780':'#5F5E5A';
  ctx.beginPath(); ctx.roundRect(10,-SPRITE_H+18,22,8,4); ctx.fill(); // 오른팔
  ctx.restore();
  ctx.save(); ctx.translate(endBx+18, GROUND_Y);
  ctx.fillStyle = isDark?'#9FE1CB':'#1D9E75';
  ctx.beginPath(); ctx.roundRect(-12,-SPRITE_H,28,SPRITE_H-10,6); ctx.fill();
  ctx.fillStyle = '#0F6E56';
  ctx.beginPath(); ctx.roundRect(-10,-SPRITE_H+2,24,14,4); ctx.fill();
  ctx.fillStyle = isDark?'#9FE1CB':'#1D9E75';
  ctx.beginPath(); ctx.roundRect(-32,-SPRITE_H+18,22,8,4); ctx.fill(); // 왼팔
  ctx.restore();
}

// ════════════════════════════════════════════════
//  드로우: 하트 파티클 (포옹씬 연출)
// ════════════════════════════════════════════════
function drawHeart(x, y, size, alpha, color) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle   = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x,y-size*.3, x-size*.5,y-size*.6, x-size*.5,y-size*.3);
  ctx.bezierCurveTo(x-size*.5,y-size*.7, x,y-size*.8, x,y-size*.5);
  ctx.bezierCurveTo(x,y-size*.8, x+size*.5,y-size*.7, x+size*.5,y-size*.3);
  ctx.bezierCurveTo(x+size*.5,y-size*.6, x,y-size*.3, x,y);
  ctx.fill();
  ctx.restore();
}

// ════════════════════════════════════════════════
//  정적 메뉴 화면 드로우 (게임 루프 없이 한 번만)
// ════════════════════════════════════════════════
function drawMenuStatic() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawGround();
  drawPlayer(true, player.ground, 0); // 슬라이딩 폼으로 대기
}

// ════════════════════════════════════════════════
//  메인 게임 루프
// ════════════════════════════════════════════════
function gameLoop(timestamp) {
  if(!lastTimestamp) lastTimestamp = timestamp;
  const dt = Math.min(timestamp - lastTimestamp, 50); // 최대 50ms 캡 (탭 전환 대비)
  lastTimestamp = timestamp;
  frameCount++;

  ctx.clearRect(0, 0, W, H);

  // 배경 타일 업데이트 및 드로우
  updateBgScroll(speed * (dt / 16.67));
  drawBg();
  drawGround();

  // ── OPENING: 슬라이딩→스탠딩→달리기 전환 연출 ──
  if(gamePhase === 'opening') {
    openingTimer += dt;
    if(openingTimer < 400) {
      scrolling = false;
      drawPlayer(true, player.ground, 0);             // 슬라이딩 대기
    } else if(openingTimer < 800) {
      scrolling = false;
      drawStanding();                                  // 스탠딩 전환
    } else {
      scrolling      = true;
      player.ducking = false;
      gamePhase      = 'playing';
      elapsedMs      = 0;
      lastTimestamp  = timestamp;
      drawPlayer(false, player.ground, frameCount);    // 전환 프레임 깜빡임 방지
    }
    gameAnimId = requestAnimationFrame(gameLoop);
    return;
  }

  // ── PLAYING: 게임 플레이 ──
  if(gamePhase === 'playing') {
    elapsedMs += dt;

    // 지수 곡선 가속: 처음엔 완만하게, 갈수록 빠르게
    speed = Math.min(INIT_SPEED + Math.pow(elapsedMs * 0.0001, 1.5), MAX_SPEED);

    // 점수 구간마다 속도 부스트 (스토리/무한 공통)
    if(displayScore >= nextBoostScore) {
      speed          = Math.min(speed + BOOST_AMOUNT, MAX_SPEED);
      nextBoostScore += BOOST_INTERVAL;
    }

    const fd = speed * (dt / 16.67); // 프레임 이동 거리
    const gs = dt / 16.67;           // 프레임 스케일

    distanceRan  += fd;
    displayScore  = Math.round(distanceRan / SCORE_DIVISOR);
    elScore.textContent = displayScore;

    // 숙이기 상태 (땅 위일 때만 적용)
    if(player.onGround) player.ducking = keys.down;

    updatePhysics(fd, gs);

    // 장애물 생성
    distSince += fd;
    if(distSince >= nextGap) spawnObstacle();

    // 그리기
    obstacles.forEach(o => drawObstacle(o));
    drawPlayer(player.ducking, player.y, frameCount);
    drawParticles();

    // 충돌 감지 (AABB, 히트박스 마진 6px)
    const mg = 6;
    const ph = player.ducking ? DUCK_H   : SPRITE_H;
    const py = player.ducking ? GROUND_Y - DUCK_H : player.y;
    const hit = obstacles.some(o => {
      const ox=o.x+mg, oy=o.y+mg, ow=o.w-mg*2, oh=o.h-mg*2;
      return player.x+mg < ox+ow && player.x+SPRITE_W-mg > ox &&
             py+mg        < oy+oh && py+ph-mg              > oy;
    });
    if(hit) {
      gamePhase = 'gameover';
      elGoScore.textContent = displayScore + '점';
      if(displayScore > bestScore) {
        bestScore = displayScore;
        elGoRecord.textContent = '최고 기록 갱신! 🎉';
      } else {
        elGoRecord.textContent = '최고 기록: ' + bestScore + '점';
      }
      showOverlay(elGameOv);
    }

    // 스토리 모드 클리어 판정
    if(mode === 'story' && displayScore >= STORY_GOAL) {
      gamePhase      = 'ending-run';
      endingRunTimer = 0;
      player.ducking = false;
      keys.down      = false;
      endAx          = player.x;     // A는 현재 플레이어 위치 이어받기
      endBx          = W + SPRITE_W; // B는 화면 오른쪽 밖에서 시작
      endWalkFrame   = 0;
    }
  }

  // ── ENDING-RUN: 클리어 후 무적 달리기 ──
  else if(gamePhase === 'ending-run') {
    elapsedMs += dt;
    speed = Math.min(INIT_SPEED + Math.pow(elapsedMs * 0.0001, 1.5), MAX_SPEED);

    const fd = speed * (dt / 16.67);
    const gs = dt / 16.67;

    player.ducking = false;       // 숙이기 강제 해제
    updatePhysics(fd, gs);        // 충돌 판정 없이 물리만 적용

    obstacles.forEach(o => drawObstacle(o));
    drawPlayer(false, player.y, frameCount);
    drawParticles();

    // 장애물 전부 사라지면 타이머 시작
    if(obstacles.length === 0) endingRunTimer += dt;

    // 타이머 완료 → 엔딩씬 진입
    if(endingRunTimer >= ENDING_RUN_MS) {
      gamePhase      = 'ending';
      endPhase       = 'walk';
      endHugScale    = 0;
      endTextAlpha   = 0;
      heartParticles = [];
      elHud.classList.remove('visible');
      elGameTip.style.display = 'none';
      drawPlayer(false, player.y, frameCount); // 전환 프레임 깜빡임 방지
    }
  }

  // ── ENDING: 엔딩 애니메이션 ──
  else if(gamePhase === 'ending') {
    endWalkFrame++;

    if(endPhase === 'walk') {
      scrolling = true;
      endAx += END_WALK_SPEED; // A가 오른쪽으로 걸어감
      endBx -= END_WALK_SPEED; // B도 같은 속도로 왼쪽 이동 → 화면 안으로 들어옴

      drawEndChar(endBx, true,  0);           // B 먼저 (frame=0: 스탠딩 정지)
      drawEndChar(endAx, false, endWalkFrame); // A 위에 (달리기 애니메이션)

      // A가 B에 도달하면 포옹 전환
      if(endAx >= endBx - SPRITE_W / 2) {
        endAx     = endBx - SPRITE_W / 2;
        endPhase  = 'hug';
        scrolling = false; // 포옹 순간부터 배경 정지

        // 하트 파티클 생성
        for(let i = 0; i < 14; i++)
          heartParticles.push({
            x: endBx, y: GROUND_Y - SPRITE_H / 2,
            vx: (Math.random()-.5)*5, vy: -(2+Math.random()*4),
            life: 1, size: 8+Math.random()*10,
            color: Math.random() > .5 ? '#D4537E' : '#EF9F27',
          });
      }
    }

    if(endPhase === 'hug' || endPhase === 'text') {
      // 포옹 이미지 페이드인
      if(endPhase === 'hug') endHugScale = Math.min(endHugScale + 0.04, 1);
      ctx.save(); ctx.globalAlpha = endHugScale; drawHugScene(); ctx.restore();

      // 포옹 완료 후 텍스트 페이드인
      if(endHugScale >= 1) endTextAlpha = Math.min(endTextAlpha + 0.018, 1);

      // 텍스트 완전히 뜨면 버튼 오버레이 표시
      if(endTextAlpha >= 1 && endPhase === 'hug') {
        endPhase = 'text';
        showOverlay(elEndOv);
      }

      ctx.save();
      ctx.globalAlpha = endTextAlpha;
      ctx.textAlign   = 'center';
      ctx.fillStyle   = '#EF9F27';
      ctx.font        = '500 20px system-ui';
      ctx.fillText('황야를 정복했다!', W/2, Math.round(H * 0.17));
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.font      = '400 13px system-ui';
      ctx.fillText('오랜 황야의 여정이 끝났습니다.', W/2, Math.round(H * 0.24));
      ctx.restore();
    }

    // 하트 파티클 업데이트 + 드로우
    heartParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.01;
      drawHeart(p.x, p.y, p.size, Math.max(0, p.life), p.color);
    });
    heartParticles = heartParticles.filter(p => p.life > 0);
  }

  // ── GAMEOVER: 화면 정지 ──
  else if(gamePhase === 'gameover') {
    obstacles.forEach(o => drawObstacle(o));
    drawPlayer(player.ducking, player.y, frameCount);
  }

  gameAnimId = requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════════
//  초기화: resizeCanvas 호출 → W,H,GROUND_Y 확정
//  → drawMenuStatic 자동 호출 (resizeCanvas 내부)
// ════════════════════════════════════════════════
resizeCanvas();
</script>
